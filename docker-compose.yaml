x-ignite-def: &ignite-def
  image: apacheignite/ignite:3.1.0
  environment:
    JVM_MAX_MEM: "1g"
    JVM_MIN_MEM: "1g"
  configs:
    - source: node_config
      target: /opt/ignite/etc/ignite-config.conf

services:
  kafka-broker:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker
    ports:
      - "19092:19092"  # For VS Code Extension
      - "9092:9092"    # RustFS - Internal Container Network
      - "29092:29092"  # KEDA
      - "9093:9093"    # Controller port
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-broker:9092,EXTERNAL://localhost:19092,PLAINTEXT://host.orb.internal:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTg0M2U0M2
      # - KAFKA_LOG4J_ROOT_LOGLEVEL=INFO
      # - KAFKA_LOG4J_LOGGERS=kafka=INFO,org.apache.kafka=INFO
    networks:
      - iceberg_net

  # node1:
  #   <<: *ignite-def
  #   command: --node-name node1
  #   ports:
  #     - "10300:10300"
  #     - "10800:10800"
  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    build: spark/
    networks:
      - iceberg_net
    depends_on:
      - kafka-broker
      - rest
      - rustfs
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_REGION=us-east-1
    ports:
      - 8888:8888
      - 8080:8080
      - 10000:10000
      - 10001:10001
  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    networks:
      - iceberg_net
    ports:
      - 8181:8181
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://rustfs:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_NOTIFY_ENABLE=true

    networks:
      - iceberg_net
    ports:
      - 9001:9001
      - 9000:9000
  mc:
    depends_on:
      - rustfs
    image: minio/mc
    container_name: mc
    restart: "no" 
    networks:
      - iceberg_net
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_REGION=us-east-1
    entrypoint: |
      /bin/sh -c "
      until (/usr/bin/mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc rm -r --force rustfs/warehouse;
      /usr/bin/mc mb rustfs/warehouse;
      /usr/bin/mc policy set public rustfs/warehouse;

      /usr/bin/mc rm -r --force rustfs/inbound;
      /usr/bin/mc mb rustfs/inbound;
      /usr/bin/mc policy set public rustfs/inbound;

      /usr/bin/mc rm -r --force rustfs/checkpoint;
      /usr/bin/mc mb rustfs/checkpoint;
      /usr/bin/mc policy set public rustfs/checkpoint;
      echo "Done!"
      "
networks:
  iceberg_net:

configs:
  node_config:
    content: |
      ignite {
        network {
          port: 3344
          nodeFinder.netClusterNodes = ["node1:3344"]
        }
      }