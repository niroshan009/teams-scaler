apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: teams-scaler
  namespace: spark
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    activeDeadlineSeconds: 1800
    backoffLimit: 1
    template:
      spec:
        serviceAccountName: spark-sa
        restartPolicy: Never
        containers:
        - name: teams-scaler
          image: local/teams-scaler:v1
          env:
            - name: SPARK_HOME
              value: "/opt/spark"
            - name: KAFKA_BOOTSTRAP_SERVER
              value: "host.orb.internal:29092"
            - name: SPARK_MASTER
              value: "k8s://https://kubernetes.default.svc:443"
            - name: SPARK_IMAGE
              value: "local/spark-ignite:v1"
            - name: SPARK_S3_URL
              value: "http://rustfs.orb.local:9000"
            - name: SPARK_DEPLOY_MODE
              value: "cluster"
            - name: SPARK_CATALOG_URL
              value: "http://iceberg-rest.orb.local:8181"

  pollingInterval: 10
  maxReplicaCount: 1
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2

  triggers:
  - type: kafka
    metadata:
      bootstrapServers: host.orb.internal:29092
      topic: rustfs.inbound.upload.topic
      consumerGroup: keda-inbound-trigger-group
      lagThreshold: '1'
      activationLagThreshold: '1'
      allowZeroLagExporter: "true"
      offsetResetPolicy: earliest
      allowIdleConsumers: "true"
      scaleToZeroOnInvalidOffset: "false"

