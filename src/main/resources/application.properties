spring.kafka.consumer.bootstrap-servers=localhost:19092
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.max-poll-records=1



spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
auto.offset.reset=earliest

spark.home=/Users/kd/git/Tools/spark-3.5.0-bin-hadoop3-scala2.13
spark.deploy.mode=cluster
spark.main.class=com.kd.utility.ImportData
spark.master=k8s://127.0.0.1:26443
spark.image=local/ignite-spark:latest
spark.s3.url=http://rustfs.orb.local:9000
spark.catalog.url=http://iceberg-rest.orb.local:8181